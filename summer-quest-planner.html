<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>暑假闯关计划</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF3EC;
    --card:#FFFFFF;
    --ink:#1F2E22;
    --muted:#6B7D6E;
    --primary:#2F6F4E;
    --primary-light:#DCEEE2;
    --amber:#F4A93B;
    --amber-light:#FCEBCD;
    --coral:#E2604F;
    --coral-light:#FBDFDA;
    --line:#DCE6D9;
    --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
    padding-bottom:96px; min-height:100vh;
  }
  .num{font-family:'Space Grotesk',ui-monospace,monospace;}

  .header{
    background:linear-gradient(135deg,var(--primary),#245c40);
    color:#fff; padding:18px 20px 22px; border-radius:0 0 26px 26px;
    box-shadow:0 6px 16px rgba(31,46,34,.15);
  }
  .header-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .header-title{font-weight:800; font-size:1.15rem; letter-spacing:.3px;}
  .header-sub{font-size:.78rem; opacity:.85; margin-top:3px;}
  .header-stats{display:flex; gap:18px; margin-top:14px;}
  .stat-block{text-align:left;}
  .stat-num{font-size:1.6rem; font-weight:700; line-height:1;}
  .stat-label{font-size:.62rem; opacity:.8; margin-top:2px; letter-spacing:.5px;}
  .progress-track{margin-top:14px; height:8px; background:rgba(255,255,255,.25); border-radius:6px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--amber); border-radius:6px; transition:width .3s;}

  .content{padding:16px; max-width:640px; margin:0 auto;}
  .view{display:none;}
  .view.active{display:block;}

  .card{background:var(--card); border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:0 2px 10px rgba(31,46,34,.06);}
  .card h3{margin:0 0 12px; font-size:.95rem; display:flex; align-items:center; gap:6px;}

  .coach-tip{background:var(--primary-light); border-left:4px solid var(--primary); padding:13px 16px; border-radius:12px; font-size:.86rem; margin-bottom:14px; line-height:1.5;}
  .coach-tip b{color:var(--primary);}

  .checklist-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(84px,1fr)); gap:10px;}
  .check-item{display:flex; flex-direction:column; align-items:center; gap:5px; padding:12px 4px; border-radius:14px; border:2px solid var(--line); cursor:pointer; transition:all .15s;}
  .check-item .icon{font-size:1.55rem;}
  .check-item .label{font-size:.72rem; font-weight:600; color:var(--muted);}
  .check-item.done{background:var(--primary-light); border-color:var(--primary);}
  .check-item.done .label{color:var(--primary);}
  .check-item.sport.done{background:var(--amber-light); border-color:var(--amber);}
  .check-item.sport.done .label{color:#a5701c;}

  .field-label{font-size:.8rem; color:var(--muted); margin:10px 0 4px; font-weight:600;}
  textarea,input[type=date],input[type=text]{
    width:100%; border:1.5px solid var(--line); border-radius:10px; padding:9px 11px;
    font-size:.88rem; font-family:inherit; resize:none; background:#FBFDFA;
  }
  .mood-row{display:flex; justify-content:space-between; margin-top:6px;}
  .mood-btn{font-size:1.5rem; background:none; border:2px solid transparent; border-radius:50%; width:46px; height:46px; cursor:pointer; opacity:.45; transition:all .15s;}
  .mood-btn.selected{opacity:1; border-color:var(--amber); background:var(--amber-light);}

  .btn{background:var(--primary); color:#fff; border:none; border-radius:12px; padding:12px 18px; font-size:.9rem; font-weight:700; cursor:pointer; width:100%; margin-top:12px;}
  .btn.secondary{background:var(--card); color:var(--primary); border:1.5px solid var(--primary);}
  .btn.danger{background:var(--coral);}
  .btn.small{width:auto; padding:8px 14px; font-size:.8rem; margin-top:0;}

  .bottom-nav{position:fixed; bottom:0; left:0; right:0; background:#fff; display:flex; justify-content:space-around; padding:8px 0 calc(8px + env(safe-area-inset-bottom)); box-shadow:0 -3px 12px rgba(0,0,0,.07); border-radius:20px 20px 0 0; z-index:50;}
  .nav-btn{background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:2px; font-size:.65rem; color:var(--muted); font-weight:600; cursor:pointer; padding:4px 10px;}
  .nav-btn .icon{font-size:1.3rem;}
  .nav-btn.active{color:var(--primary);}

  /* map */
  .week-row{display:flex; align-items:center; gap:8px; margin-bottom:4px;}
  .week-label{font-size:.68rem; color:var(--muted); width:38px; flex-shrink:0; font-weight:700;}
  #mapSvgWrap{overflow-x:auto;}
  .stone-tip{font-size:.7rem; text-align:center; color:var(--muted); margin-top:6px;}

  .overlay{position:fixed; inset:0; background:rgba(31,46,34,.45); display:none; align-items:center; justify-content:center; z-index:100; padding:20px;}
  .overlay.active{display:flex;}
  .overlay-card{background:#fff; border-radius:20px; padding:22px; max-width:400px; width:100%; max-height:80vh; overflow-y:auto;}
  .overlay-card h3{margin-top:0;}
  .close-x{position:absolute; top:14px; right:18px; font-size:1.3rem; background:none; border:none; color:var(--muted); cursor:pointer;}

  .bar-row{margin-bottom:12px;}
  .bar-row-top{display:flex; justify-content:space-between; font-size:.8rem; margin-bottom:4px;}
  .bar-track{height:12px; background:var(--line); border-radius:8px; overflow:hidden;}
  .bar-fill{height:100%; border-radius:8px; transition:width .4s;}

  .toggle-group{display:flex; gap:8px; margin-bottom:14px;}
  .toggle-btn{flex:1; padding:9px; border-radius:10px; border:1.5px solid var(--line); background:#fff; font-size:.82rem; font-weight:600; color:var(--muted); cursor:pointer;}
  .toggle-btn.active{background:var(--primary); color:#fff; border-color:var(--primary);}

  .summary-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .summary-box{background:var(--bg); border-radius:12px; padding:12px; text-align:center;}
  .summary-box .num{font-size:1.3rem; font-weight:700; color:var(--primary);}
  .summary-box .lbl{font-size:.68rem; color:var(--muted); margin-top:2px;}

  .day-empty{text-align:center; color:var(--muted); font-size:.85rem; padding:20px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title" id="headerTitle">🌿 暑假闯关计划</div>
      <div class="header-sub" id="headerSub">加载中…</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-block"><div class="stat-num num" id="statDay">-</div><div class="stat-label">今天是第几天</div></div>
    <div class="stat-block"><div class="stat-num num" id="statStreak">-</div><div class="stat-label">🔥 连续达标</div></div>
    <div class="stat-block"><div class="stat-num num" id="statLeft">-</div><div class="stat-label">距开学还有</div></div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="content">

  <!-- 今日 -->
  <div class="view active" id="view-today">
    <div class="coach-tip" id="coachTip">教练寄语加载中…</div>

    <div class="card">
      <h3 id="todayDateLabel">今天</h3>
      <div class="checklist-grid" id="checklistGrid"></div>
    </div>

    <div class="card">
      <h3>📝 今天的三句话反思</h3>
      <div class="field-label">今天最有成就感的一件事？</div>
      <textarea id="refGood" rows="2" placeholder="一句话就好～"></textarea>
      <div class="field-label">今天觉得最难的是？</div>
      <textarea id="refHard" rows="2" placeholder="学科或运动都可以"></textarea>
      <div class="field-label">明天想改进一点点的是？</div>
      <textarea id="refImprove" rows="2" placeholder="小小的目标就够啦"></textarea>
      <div class="field-label">今天心情怎么样？</div>
      <div class="mood-row" id="moodRow"></div>
      <button class="btn" onclick="saveToday()">保存今天</button>
    </div>
  </div>

  <!-- 地图 -->
  <div class="view" id="view-map">
    <div class="card">
      <h3>🗺️ 闯关地图</h3>
      <div class="stone-tip">点一个石头看看那天做了什么～</div>
      <div id="mapSvgWrap"></div>
    </div>
  </div>

  <!-- 统计 -->
  <div class="view" id="view-stats">
    <div class="card">
      <div class="toggle-group">
        <button class="toggle-btn active" id="rangeBtn7" onclick="setStatsRange(7)">近7天</button>
        <button class="toggle-btn" id="rangeBtn30" onclick="setStatsRange(30)">近30天</button>
      </div>
      <h3>📊 完成情况</h3>
      <div id="barChart"></div>
    </div>
    <div class="card">
      <h3>📈 心情曲线</h3>
      <div id="moodChart"></div>
    </div>
    <div class="card">
      <h3>🏆 总览</h3>
      <div class="summary-grid" id="summaryGrid"></div>
    </div>
  </div>

  <!-- 备份/设置 -->
  <div class="view" id="view-backup">
    <div class="card">
      <h3>⚙️ 计划设置</h3>
      <div class="field-label">开学日期</div>
      <input type="date" id="settingsSchoolDate">
      <button class="btn secondary" onclick="saveSettings()">保存设置</button>
    </div>
    <div class="card">
      <h3>💾 数据备份</h3>
      <div class="field-label">导出一份备份文件保存好，换设备或者不小心清理浏览器数据时可以恢复。</div>
      <button class="btn" onclick="exportData()">导出备份</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn secondary" onclick="document.getElementById('importFile').click()">导入备份</button>
    </div>
    <div class="card">
      <h3>⚠️ 重置数据</h3>
      <div class="field-label">会清空所有打卡和反思记录，请谨慎操作。</div>
      <button class="btn danger" onclick="resetAll()">清空所有数据</button>
    </div>
  </div>

</div>

<div class="bottom-nav">
  <button class="nav-btn active" data-view="today" onclick="switchView('today')"><span class="icon">🏠</span>今日</button>
  <button class="nav-btn" data-view="map" onclick="switchView('map')"><span class="icon">🗺️</span>地图</button>
  <button class="nav-btn" data-view="stats" onclick="switchView('stats')"><span class="icon">📊</span>统计</button>
  <button class="nav-btn" data-view="backup" onclick="switchView('backup')"><span class="icon">⚙️</span>设置</button>
</div>

<!-- 首次使用引导 -->
<div class="overlay" id="onboardOverlay">
  <div class="overlay-card">
    <h3>🌿 欢迎开始暑假闯关！</h3>
    <div class="field-label">怎么称呼你呀？（选填）</div>
    <input type="text" id="onboardName" placeholder="比如：小宇">
    <div class="field-label">开学日期是哪天？</div>
    <input type="date" id="onboardSchoolDate">
    <button class="btn" onclick="finishOnboarding()">开始闯关！</button>
  </div>
</div>

<!-- 地图详情弹窗 -->
<div class="overlay" id="dayDetailOverlay">
  <div class="overlay-card" style="position:relative">
    <button class="close-x" onclick="closeOverlay('dayDetailOverlay')">✕</button>
    <div id="dayDetailContent"></div>
  </div>
</div>

<script>
/* ========================= 数据结构 ========================= */
const CONFIG_KEY = 'squest_config_v1';
const DATA_KEY = 'squest_data_v1';

const CATEGORIES = [
  {id:'chinese',     label:'语文',   icon:'📖', group:'study'},
  {id:'math',        label:'数学',   icon:'🧮', group:'study'},
  {id:'english',     label:'英语',   icon:'🔤', group:'study'},
  {id:'handwriting', label:'练字',   icon:'✍️', group:'study'},
  {id:'badminton',   label:'羽毛球', icon:'🏸', group:'sport'},
  {id:'jumprope',    label:'跳绳',   icon:'🪢', group:'sport'},
  {id:'running',     label:'跑步',   icon:'🏃', group:'sport'},
];
const MOODS = [
  {v:1, e:'😞'}, {v:2, e:'😐'}, {v:3, e:'🙂'}, {v:4, e:'😄'}, {v:5, e:'🤩'}
];

let statsRange = 7;

/* ========================= 工具函数 ========================= */
function pad(n){ return n<10 ? '0'+n : ''+n; }
function toKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function todayKey(){ return toKey(new Date()); }
function addDays(d, n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function daysBetween(a,b){ return Math.round((b-a)/86400000); }
function parseKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }

function loadConfig(){
  try{ const raw = localStorage.getItem(CONFIG_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function saveConfig(cfg){ localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); }
function loadData(){
  try{ const raw = localStorage.getItem(DATA_KEY); return raw ? JSON.parse(raw) : {}; }
  catch(e){ return {}; }
}
function saveData(data){ localStorage.setItem(DATA_KEY, JSON.stringify(data)); }

function getRecord(data, key){
  if(!data[key]){
    data[key] = {chinese:false, math:false, english:false, handwriting:false,
                 badminton:false, jumprope:false, running:false,
                 reflection:null};
  }
  return data[key];
}
function completedCount(rec){
  return CATEGORIES.filter(c=>rec[c.id]).length;
}
function isQualified(rec){ return completedCount(rec) >= 5; } // 5/7 项算达标

/* ========================= 全局状态 ========================= */
let config = loadConfig();
let data = loadData();

/* ========================= 初始化 ========================= */
function init(){
  if(!config){
    const d = new Date();
    document.getElementById('onboardSchoolDate').value = toKey(addDays(d,60));
    document.getElementById('onboardOverlay').classList.add('active');
    return;
  }
  renderAll();
}

function finishOnboarding(){
  const name = document.getElementById('onboardName').value.trim();
  const schoolDate = document.getElementById('onboardSchoolDate').value;
  if(!schoolDate){ alert('请选一下开学日期哦'); return; }
  config = { name: name, startDate: todayKey(), schoolDate: schoolDate };
  saveConfig(config);
  document.getElementById('onboardOverlay').classList.remove('active');
  renderAll();
}

function saveSettings(){
  const v = document.getElementById('settingsSchoolDate').value;
  if(!v){ alert('请选一下开学日期哦'); return; }
  config.schoolDate = v;
  saveConfig(config);
  alert('已保存～');
  renderAll();
}

/* ========================= 视图切换 ========================= */
function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.view===name));
  if(name==='map') renderMap();
  if(name==='stats') renderStats();
  if(name==='backup') document.getElementById('settingsSchoolDate').value = config.schoolDate;
}
function closeOverlay(id){ document.getElementById(id).classList.remove('active'); }

/* ========================= 顶部头部 ========================= */
function renderHeader(){
  const start = parseKey(config.startDate);
  const school = parseKey(config.schoolDate);
  const today = parseKey(todayKey());
  const totalDays = Math.max(1, daysBetween(start, school));
  const dayIndex = Math.max(1, daysBetween(start, today)+1);
  const daysLeft = Math.max(0, daysBetween(today, school));

  document.getElementById('headerTitle').textContent = (config.name ? config.name+'的' : '') + '🌿 暑假闯关计划';
  document.getElementById('headerSub').textContent = '开学日：' + config.schoolDate;
  document.getElementById('statDay').textContent = dayIndex + ' / ' + totalDays;
  document.getElementById('statLeft').textContent = daysLeft + ' 天';

  // streak: 从今天往前数，连续达标天数
  let streak = 0;
  let cursor = new Date(today);
  // 如果今天还没达标，从昨天开始数（今天还有机会，不算断）
  const todayRec = data[todayKey()];
  if(!todayRec || !isQualified(todayRec)) cursor = addDays(cursor,-1);
  while(true){
    const k = toKey(cursor);
    const rec = data[k];
    if(rec && isQualified(rec)){ streak++; cursor = addDays(cursor,-1); }
    else break;
  }
  document.getElementById('statStreak').textContent = streak + ' 天';
  const pct = Math.min(100, Math.round(dayIndex/totalDays*100));
  document.getElementById('progressFill').style.width = pct+'%';
}

/* ========================= 今日打卡 ========================= */
function renderToday(){
  const key = todayKey();
  const rec = getRecord(data, key);
  const d = parseKey(key);
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('todayDateLabel').textContent =
    `今天 ${d.getMonth()+1}月${d.getDate()}日 ${weekdays[d.getDay()]}`;

  const grid = document.getElementById('checklistGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(c=>{
    const el = document.createElement('div');
    el.className = 'check-item ' + (c.group==='sport'?'sport ':'') + (rec[c.id]?'done':'');
    el.innerHTML = `<span class="icon">${c.icon}</span><span class="label">${c.label}</span>`;
    el.onclick = ()=>{
      rec[c.id] = !rec[c.id];
      saveData(data);
      renderToday();
      renderHeader();
    };
    grid.appendChild(el);
  });

  // reflection
  const ref = rec.reflection || {good:'',hard:'',improve:'',mood:null};
  document.getElementById('refGood').value = ref.good;
  document.getElementById('refHard').value = ref.hard;
  document.getElementById('refImprove').value = ref.improve;

  const moodRow = document.getElementById('moodRow');
  moodRow.innerHTML = '';
  MOODS.forEach(m=>{
    const btn = document.createElement('button');
    btn.className = 'mood-btn' + (ref.mood===m.v ? ' selected':'');
    btn.textContent = m.e;
    btn.onclick = ()=>{ ref.mood = m.v; rec.reflection = ref; saveData(data); renderToday(); };
    moodRow.appendChild(btn);
  });

  renderCoachTip();
}

function saveToday(){
  const key = todayKey();
  const rec = getRecord(data, key);
  rec.reflection = rec.reflection || {};
  rec.reflection.good = document.getElementById('refGood').value.trim();
  rec.reflection.hard = document.getElementById('refHard').value.trim();
  rec.reflection.improve = document.getElementById('refImprove').value.trim();
  saveData(data);
  alert('今天保存好啦，明天继续加油！💪');
}

/* ========================= 教练寄语 ========================= */
function renderCoachTip(){
  const today = parseKey(todayKey());
  const range = getDatesInRange(addDays(today,-6), today);
  const stats = computeCategoryStats(range);

  const tips = [];
  const studyStats = stats.filter(s=>s.group==='study').sort((a,b)=>a.pct-b.pct);
  const sportStats = stats.filter(s=>s.group==='sport').sort((a,b)=>a.pct-b.pct);

  if(studyStats.length && studyStats[0].pct < 50){
    tips.push(`最近一周<b>${studyStats[0].label}</b>完成得比较少，明天可以先从它开始哦。`);
  }
  if(sportStats.length && sportStats[0].pct < 40){
    tips.push(`<b>${sportStats[0].label}</b>好几天没安排啦，运动一下心情会更好～`);
  }

  // streak based tip
  const streakText = document.getElementById('statStreak').textContent;
  const streakNum = parseInt(streakText) || 0;
  if(streakNum >= 5){
    tips.push(`已经连续达标 <b>${streakNum}</b> 天啦，非常棒，继续保持！🔥`);
  } else if(streakNum === 0){
    tips.push('新的一天，新的开始，今天争取完成5项以上打卡吧！');
  }

  // mood trend
  const recentMoods = range.map(k=>{ const r=data[k]; return r && r.reflection && r.reflection.mood ? r.reflection.mood : null; }).filter(v=>v!==null);
  if(recentMoods.length>=3){
    const avg = recentMoods.slice(-3).reduce((a,b)=>a+b,0)/3;
    if(avg < 2.5) tips.push('这几天心情看起来有点低落，如果有烦心事，记得和爸爸妈妈聊聊～');
  }

  if(tips.length===0) tips.push('保持这个节奏就很好，今天也要加油哦！');
  document.getElementById('coachTip').innerHTML = '👩‍🏫 <b>教练小贴士：</b>' + tips[0];
}

/* ========================= 日期区间工具 ========================= */
function getDatesInRange(startD, endD){
  const arr = [];
  let cur = new Date(startD);
  while(cur <= endD){ arr.push(toKey(cur)); cur = addDays(cur,1); }
  return arr;
}
function computeCategoryStats(dateKeys){
  return CATEGORIES.map(c=>{
    let done=0, total=0;
    dateKeys.forEach(k=>{
      const rec = data[k];
      if(rec){ total++; if(rec[c.id]) done++; }
    });
    return {id:c.id, label:c.label, icon:c.icon, group:c.group,
            pct: total ? Math.round(done/total*100) : 0, done, total};
  });
}

/* ========================= 地图 ========================= */
function renderMap(){
  const start = parseKey(config.startDate);
  const school = parseKey(config.schoolDate);
  const totalDays = Math.max(1, daysBetween(start, school));
  const today = todayKey();

  const perRow = 7;
  const rows = Math.ceil(totalDays / perRow);
  const cellW = 46, cellH = 78, r = 17;
  const width = perRow*cellW + 40;
  const height = rows*cellH + 30;

  let svg = `<svg viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" style="max-width:100%">`;
  let points = [];
  for(let i=0;i<totalDays;i++){
    const row = Math.floor(i/perRow);
    let col = i % perRow;
    if(row % 2 === 1) col = perRow - 1 - col;
    const x = 30 + col*cellW;
    const y = 30 + row*cellH;
    points.push({x,y,i});
  }
  // connecting line
  let path = 'M ' + points.map(p=>p.x+' '+p.y).join(' L ');
  svg += `<path d="${path}" fill="none" stroke="#DCE6D9" stroke-width="4" stroke-linecap="round"/>`;

  points.forEach(p=>{
    const dateKey = toKey(addDays(start, p.i));
    const rec = data[dateKey];
    const cnt = rec ? completedCount(rec) : 0;
    let fill = '#E4E9E1', stroke = '#DCE6D9', textEl = '';
    if(dateKey === today){
      stroke = '#F4A93B'; fill = '#fff';
      svg += `<circle cx="${p.x}" cy="${p.y}" r="${r+6}" fill="none" stroke="#F4A93B" stroke-width="2" stroke-dasharray="3 3"/>`;
    }
    if(rec && cnt >= 5){ fill = '#2F6F4E'; stroke = '#2F6F4E'; }
    else if(rec && cnt > 0){ fill = '#FCEBCD'; stroke = '#F4A93B'; }
    svg += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="2" data-key="${dateKey}" onclick="showDayDetail('${dateKey}')" style="cursor:pointer"/>`;
    if(cnt>=5){
      svg += `<text x="${p.x}" y="${p.y+5}" text-anchor="middle" font-size="14" fill="#fff">✓</text>`;
    } else {
      svg += `<text x="${p.x}" y="${p.y+4}" text-anchor="middle" font-size="11" fill="#6B7D6E">${p.i+1}</text>`;
    }
  });
  svg += '</svg>';
  document.getElementById('mapSvgWrap').innerHTML = svg;
}

function showDayDetail(dateKey){
  const rec = data[dateKey];
  const d = parseKey(dateKey);
  let html = `<h3>${d.getMonth()+1}月${d.getDate()}日</h3>`;
  if(!rec){
    html += '<div class="day-empty">这天还没有记录哦</div>';
  } else {
    html += '<div class="checklist-grid" style="margin-bottom:14px">';
    CATEGORIES.forEach(c=>{
      html += `<div class="check-item ${c.group==='sport'?'sport ':''}${rec[c.id]?'done':''}">
        <span class="icon">${c.icon}</span><span class="label">${c.label}</span></div>`;
    });
    html += '</div>';
    if(rec.reflection && (rec.reflection.good || rec.reflection.hard || rec.reflection.improve)){
      const moodEmoji = rec.reflection.mood ? MOODS.find(m=>m.v===rec.reflection.mood).e : '';
      html += `<div class="field-label">反思 ${moodEmoji}</div>`;
      if(rec.reflection.good) html += `<div style="font-size:.85rem;margin-bottom:4px">😊 ${escapeHtml(rec.reflection.good)}</div>`;
      if(rec.reflection.hard) html += `<div style="font-size:.85rem;margin-bottom:4px">😣 ${escapeHtml(rec.reflection.hard)}</div>`;
      if(rec.reflection.improve) html += `<div style="font-size:.85rem;margin-bottom:4px">🎯 ${escapeHtml(rec.reflection.improve)}</div>`;
    }
  }
  document.getElementById('dayDetailContent').innerHTML = html;
  document.getElementById('dayDetailOverlay').classList.add('active');
}
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ========================= 统计 ========================= */
function setStatsRange(n){
  statsRange = n;
  document.getElementById('rangeBtn7').classList.toggle('active', n===7);
  document.getElementById('rangeBtn30').classList.toggle('active', n===30);
  renderStats();
}
function renderStats(){
  const today = parseKey(todayKey());
  const range = getDatesInRange(addDays(today, -(statsRange-1)), today);
  const stats = computeCategoryStats(range);

  const colors = {study:'#2F6F4E', sport:'#F4A93B'};
  let barsHtml = '';
  stats.forEach(s=>{
    barsHtml += `<div class="bar-row">
      <div class="bar-row-top"><span>${s.icon} ${s.label}</span><span class="num">${s.pct}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${s.pct}%;background:${colors[s.group]}"></div></div>
    </div>`;
  });
  document.getElementById('barChart').innerHTML = barsHtml;

  // mood chart
  const moods = range.map(k=>{ const r=data[k]; return (r && r.reflection && r.reflection.mood) ? r.reflection.mood : null; });
  document.getElementById('moodChart').innerHTML = renderMoodSvg(moods, range);

  // summary
  let totalCheckin=0, fullDays=0, longest=0, cur=0;
  const allKeys = Object.keys(data).sort();
  allKeys.forEach(k=>{
    const rec = data[k];
    const c = completedCount(rec);
    if(c>0) totalCheckin++;
    if(isQualified(rec)){ cur++; longest = Math.max(longest,cur); } else { cur=0; }
    if(c===7) fullDays++;
  });
  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-box"><div class="num">${totalCheckin}</div><div class="lbl">累计打卡天数</div></div>
    <div class="summary-box"><div class="num">${longest}</div><div class="lbl">最长连续达标</div></div>
    <div class="summary-box"><div class="num">${fullDays}</div><div class="lbl">全勤天数</div></div>
    <div class="summary-box"><div class="num">${allKeys.length}</div><div class="lbl">有记录的天数</div></div>
  `;
}

function renderMoodSvg(moods, range){
  const w = 320, h = 120, pad = 20;
  const n = moods.length;
  if(n===0) return '<div class="day-empty">还没有心情记录</div>';
  const stepX = (w - pad*2) / Math.max(1,n-1);
  const yFor = v => h - pad - (v-1)/4*(h-pad*2);

  let segments = [];
  let cur = [];
  moods.forEach((v,i)=>{
    if(v===null){
      if(cur.length){ segments.push(cur); cur=[]; }
    } else {
      cur.push({x: pad + i*stepX, y: yFor(v), i});
    }
  });
  if(cur.length) segments.push(cur);

  let svg = `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">`;
  // gridlines
  for(let v=1; v<=5; v++){
    const y = yFor(v);
    svg += `<line x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}" stroke="#EEF3EC" stroke-width="1"/>`;
  }
  segments.forEach(seg=>{
    const d = 'M ' + seg.map(p=>p.x+' '+p.y).join(' L ');
    svg += `<path d="${d}" fill="none" stroke="#F4A93B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    seg.forEach(p=>{ svg += `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#F4A93B"/>`; });
  });
  svg += '</svg>';
  return svg;
}

/* ========================= 备份/重置 ========================= */
function exportData(){
  const payload = { config, data, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  a.href = url;
  a.download = `暑假闯关备份_${toKey(d)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importData(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const payload = JSON.parse(e.target.result);
      if(!payload.config || !payload.data) throw new Error('格式不对');
      if(!confirm('导入会覆盖当前所有数据，确定要继续吗？')) return;
      config = payload.config;
      data = payload.data;
      saveConfig(config);
      saveData(data);
      alert('导入成功！');
      renderAll();
    }catch(err){
      alert('这个文件读取失败，请确认是之前导出的备份文件～');
    }
    evt.target.value = '';
  };
  reader.readAsText(file);
}
function resetAll(){
  if(!confirm('确定要清空所有打卡和反思记录吗？这个操作不能撤销。')) return;
  if(!confirm('再次确认：真的要清空全部数据吗？')) return;
  localStorage.removeItem(DATA_KEY);
  data = {};
  renderAll();
  alert('已清空，重新开始吧！');
}

/* ========================= 总渲染 ========================= */
function renderAll(){
  renderHeader();
  renderToday();
}

init();
